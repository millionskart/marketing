<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg-subtle:#f8f9fa;--bg-hover:#f1f3f5;
  --border:#e5e7eb;--border-strong:#d1d5db;
  --text:#0f172a;--text-secondary:#64748b;--text-tertiary:#94a3b8;
  --accent:#2563eb;--accent-light:#eff6ff;--accent-hover:#1d4ed8;
  --success:#16a34a;--success-light:#f0fdf4;
  --error:#dc2626;--error-light:#fef2f2;
  --warning:#d97706;--warning-light:#fffbeb;
  --locked:#9ca3af;--radius:8px;--radius-lg:12px;
  --shadow-lg:0 4px 16px rgba(0,0,0,0.10);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-subtle)}
.auth-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px 40px;width:420px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.auth-logo-mark{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
.auth-logo-text{font-size:17px;font-weight:600}.auth-logo-sub{font-size:12px;color:var(--text-secondary);margin-top:1px}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.auth-tab{padding:8px 0;margin-right:24px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-msg{border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:16px}
.auth-msg.error{background:var(--error-light);border:1px solid #fecaca;color:var(--error)}
.auth-msg.success{background:var(--success-light);border:1px solid #86efac;color:var(--success)}
.field{margin-bottom:16px}.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
.field input{width:100%;padding:10px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:14px;font-family:var(--font);outline:none;transition:border 0.15s;background:var(--bg);color:var(--text)}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s;font-family:var(--font)}
.btn:disabled{opacity:0.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;width:100%;padding:11px;font-size:15px}.btn-primary:hover:not(:disabled){background:var(--accent-hover)}
.btn-secondary{background:var(--bg);border:1px solid var(--border-strong);color:var(--text)}.btn-secondary:hover:not(:disabled){background:var(--bg-hover)}
.btn-sm{padding:7px 13px;font-size:13px;width:auto}
.btn-success{background:var(--success);color:#fff}.btn-success:hover:not(:disabled){background:#15803d}
.btn-danger{background:var(--error);color:#fff}.btn-danger:hover:not(:disabled){background:#b91c1c}
#app{display:none;height:100vh;overflow:hidden;flex-direction:column}
.topbar{height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--bg);z-index:10}
.topbar-logo{display:flex;align-items:center;gap:8px}
.topbar-logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px}
.topbar-logo-name{font-size:14px;font-weight:600}
.topbar-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.topbar-section{font-size:13px;color:var(--text-secondary)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--accent)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;border-right:1px solid var(--border);background:var(--bg-subtle);overflow-y:auto;flex-shrink:0;padding:12px 0;display:flex;flex-direction:column}
.sidebar-label{padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em}
.ch-item{padding:8px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background 0.1s}
.ch-item:hover:not(.locked-item){background:var(--bg-hover)}.ch-item.active{background:var(--accent-light)}.ch-item.locked-item{cursor:not-allowed;opacity:0.5}
.ch-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ch-icon.u{background:var(--accent-light)}.ch-icon.l{background:var(--bg-hover)}.ch-icon.d{background:var(--success-light)}.ch-icon.a{background:var(--accent)}
.ch-meta{flex:1;min-width:0}.ch-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-item.active .ch-name{color:var(--accent);font-weight:600}.ch-status{font-size:11px;color:var(--text-tertiary);margin-top:1px}
.ch-status.passed{color:var(--success)}.ch-status.locked{color:var(--locked)}
.nav-item{padding:8px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);transition:background 0.1s}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}.nav-item.active{background:var(--bg-hover);color:var(--text);font-weight:500}
.sidebar-bottom{padding:16px;border-top:1px solid var(--border);margin-top:auto}
.prog-bar{height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:6px}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.4s ease}
.content{flex:1;overflow-y:auto;padding:40px 48px}.ci{max-width:720px}
.eyebrow{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.page-title{font-size:28px;font-weight:700;line-height:1.25;margin-bottom:8px}
.page-sub{font-size:15px;color:var(--text-secondary);margin-bottom:32px;line-height:1.6}
.divider{height:1px;background:var(--border);margin:32px 0}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:500}
.badge-blue{background:var(--accent-light);color:var(--accent)}.badge-green{background:var(--success-light);color:var(--success)}
.badge-orange{background:var(--warning-light);color:var(--warning)}.badge-gray{background:var(--bg-hover);color:var(--text-secondary)}
.notion-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-subtle);margin-bottom:10px;transition:border 0.15s;cursor:pointer}
.notion-card:hover{border-color:var(--accent)}
.test-cta{background:var(--accent-light);border:1.5px solid var(--accent);border-radius:var(--radius-lg);padding:24px 28px;margin-top:32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.passed-banner{background:var(--success-light);border:1.5px solid #86efac;border-radius:var(--radius-lg);padding:20px 24px;margin-top:32px;display:flex;align-items:flex-start;gap:16px}
.t-prog{height:4px;background:var(--border);border-radius:99px;margin-bottom:28px;overflow:hidden}
.t-prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.3s}
.q-num{font-size:12px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.q-text{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:24px}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.opt{padding:14px 18px;border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:14px;transition:all 0.15s;display:flex;align-items:flex-start;gap:12px;line-height:1.5}
.opt:hover{border-color:var(--accent);background:var(--accent-light)}.opt.sel{border-color:var(--accent);background:var(--accent-light)}
.opt-ltr{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.opt.sel .opt-ltr{border-color:var(--accent);color:var(--accent)}
.test-nav{display:flex;justify-content:space-between;align-items:center}
.res-card{text-align:center;padding:40px 32px}
.res-score{font-size:56px;font-weight:800;line-height:1;margin:16px 0 8px}
.res-score.pass{color:var(--success)}.res-score.fail{color:var(--error)}
.res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px}
.res-stat{background:var(--bg-subtle);border-radius:var(--radius);padding:14px;text-align:center}
.res-stat-val{font-size:20px;font-weight:700}.res-stat-lab{font-size:12px;color:var(--text-secondary);margin-top:2px}
.adm-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px}
.adm-tab{padding:10px 0;margin-right:24px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
.adm-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-secondary);background:var(--bg-subtle);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.04em}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--bg-subtle)}
.pm{display:flex;align-items:center;gap:8px}.pm-bar{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.pm-fill{height:100%;background:var(--accent);border-radius:99px}
.pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.pill{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.pill-p{background:var(--success-light);color:var(--success)}.pill-f{background:var(--error-light);color:var(--error)}.pill-n{background:var(--bg-hover);color:var(--text-tertiary)}
.inv-form{background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px}
.imsg{font-size:13px;padding:8px 12px;border-radius:var(--radius);margin-top:10px}
.imsg.s{background:var(--success-light);color:var(--success)}.imsg.e{background:var(--error-light);color:var(--error)}
.empty{text-align:center;padding:48px 24px;color:var(--text-secondary);font-size:14px}
select{padding:9px 13px;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:14px;font-family:var(--font);outline:none;background:var(--bg);color:var(--text);cursor:pointer;width:100%}
select:focus{border-color:var(--accent)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text-secondary);font-size:14px}
</style>
</head>

<div id="auth-screen">
  <div class="auth-card">

</div>

<div id="app">
  <div class="topbar">

<script>
// ─── CHAPTERS DATA ───────────────────────────────────────────
const CHS = [
  {id:1,e:'🍎',t:'ABC of Digital Marketing',s:'Chapter 1',
   desc:'The foundational layer. Performance marketing, 5 awareness levels, good vs bad marketing, the complete purchase journey, and every core metric your team needs to know.',
   topics:['What is Performance Marketing','5 Awareness Levels','Good vs Bad Marketing','The Marketing Funnel','Cold vs Warm Traffic','Core Metrics: RoAS, CAC, CTR, CVR, MER, LTV','MC vs Peeperly Brand Split'],
   link:'https://app.notion.com/p/Ch-1-ABC-of-Digital-Marketing-1986e4ff58a2805aa165ff3dabb44290',
   qs:[
    {q:"What does 'performance marketing' mean?",o:["Using only social media","Every rupee spent is tracked and measured against a specific result — unlike TV/billboards where you can't measure exact sales","Running paid ads on Meta and Google only","Marketing performed live in front of an audience"],a:1},
    {q:"What is MK's single north star objective?",o:["Get as many orders as possible regardless of cost","Build the most followers on Instagram","Get sales profitably AND scale the business — both together","Maximise RoAS above 5x at all times"],a:2},
    {q:"What is the golden rule of marketing?",o:["Spend as little as possible on ads","Sell the outcome, not the object","Always offer a discount to convert customers","Target the broadest possible audience"],a:1},
    {q:"A customer scrolling Instagram hasn't thought about phone cases in months. What awareness level are they at?",o:["Level 3 — Solution Aware","Level 5 — Most Aware","Level 1 — Unaware","Level 2 — Problem Aware"],a:2},
    {q:"What is the correct ad approach for a Level 1 (Unaware) customer?",o:["Show a discount code immediately","Interrupt with something visually compelling — make them feel something first, don't mention the product immediately","Explain all product features in detail","Retarget them with a direct buy-now CTA"],a:1},
    {q:"What does RoAS stand for and what is its formula?",o:["Return on Ad Spend. Formula: Revenue from ads ÷ Ad Spend","Rate of Ad Success. Formula: Clicks ÷ Impressions","Revenue of Ad Sales. Formula: Total Revenue ÷ Total Orders","Return on All Spend. Formula: Net Profit ÷ Total Costs"],a:0},
    {q:"If CAC is ₹400 and profit per order after all costs is ₹300 — what is happening?",o:["The business is healthy and should scale","The business is losing ₹100 on every customer acquired — unsustainable","The business is breaking even","The business has a 33% profit margin"],a:1},
    {q:"What is MER and what does it stand for?",o:["Meta Efficiency Ratio — Meta's internal quality score","Marketing Efficiency Ratio — Total Revenue ÷ Total Marketing Spend across ALL channels","Maximum Expected Return — target RoAS for any campaign","Monthly Engagement Rate — social media metric"],a:1},
    {q:"Why is Peeperly marketed differently from Million Cases?",o:["Because Peeperly is cheaper","MC targets boys; Peeperly targets girls","Peeperly is a premium play with higher AOV — RoAS degrades at scale, needs brand equity not just performance ads. MC is a volume play with broad audience and direct-response focus.","Peeperly only runs on Google, MC only on Meta"],a:2},
    {q:"What are the 3 core objections of every cold traffic customer?",o:["Price, Colour, Size","I don't know this brand / What if it's bad quality or doesn't fit / Why should I buy right now","Delivery time, Return policy, Payment options","Design, Durability, Discount availability"],a:1},
    {q:"What is the difference between CVR and CTR?",o:["They are the same metric","CTR measures % who clicked the ad; CVR measures % of site visitors who bought","CVR is for Meta; CTR is for Google","CTR measures conversions; CVR measures clicks"],a:1},
    {q:"What does a high CTR with a low CVR tell you?",o:["The targeting is wrong","The ad is promising something the product page isn't delivering — fix the landing page, not the ad","The creative needs to be changed immediately","The audience is too broad"],a:1},
    {q:"What are the 3 types of problems a business can have?",o:["Creative, Audience, Budget","Offer problem, Product problem, Marketing problem","Design, Pricing, Delivery","RoAS, CTR, CVR"],a:1},
    {q:"What is Peeperly's approximate AOV range?",o:["₹299–499","₹650–750","₹1,100–1,200","₹2,000–2,500"],a:2},
    {q:"What is the 'Art of the Sale' — the two states every purchase bridges?",o:["Current Price → Desired Price","Current State (where they are now, the problem/frustration) → Desired State (where they want to be). Your product is the bridge.","Current Product → Desired Product","Current Brand → Desired Brand"],a:1}
   ]},
  {id:2,e:'📡',t:'Channels & Platforms',s:'Chapter 2',
   desc:"Meta Ads, Google, WhatsApp, Email, Influencer Marketing, Native Ads, VSLs, and every channel MK uses — how each works, when to use it, and how to read if it's working.",
   topics:['Meta Ads — Campaign Structure','CBO vs ABO','Google PMax & Shopping','WhatsApp Automation','Email Flows','Influencer Tiers','Native Ads & Advertorials','VSL Structure','Channel Priority Hierarchy'],
   link:'https://app.notion.com/p/Ch-2-Channels-Platforms-3666e4ff58a28097bdcecd7b40cc9317',
   qs:[
    {q:"What is the key difference between Meta and Google from a marketing psychology standpoint?",o:["Meta is cheaper; Google is more accurate","Meta is a discovery platform — you interrupt people who weren't thinking about your product. Google captures existing intent — people actively searching for what you sell.","Meta works for B2B; Google works for B2C","Meta only works for video; Google only works for text"],a:1},
    {q:"What are the three levels of Meta's campaign hierarchy?",o:["Strategy → Execution → Reporting","Campaign → Ad Set → Ad","Account → Campaign → Creative","Funnel → Audience → Budget"],a:1},
    {q:"What does CBO stand for and what does it mean?",o:["Cost Budget Optimisation — sets cost cap across all ad sets","Campaign Budget Optimisation — budget is set at campaign level and Meta distributes it across ad sets based on performance","Creative Budget Overlap — when two creatives compete","Click-Based Optimisation — Meta optimises for clicks only"],a:1},
    {q:"What is the most common reason Meta won't spend on a new ad?",o:["The ad is too expensive to run","The audience is too large","The hook has no curiosity — it doesn't call out the audience, imply a benefit, or drive curiosity","Meta needs 7 days to approve all new ads"],a:2},
    {q:"What are the three primary email automation flows every MK marketer should know?",o:["Welcome flow, Discount flow, Unsubscribe flow","Post-purchase flow, Win-back flow (dormant customers), New collection launch flow","New customer flow, Loyalty flow, Sale announcement flow","Onboarding flow, Upsell flow, Re-engagement flow"],a:1},
    {q:"Why is WhatsApp uniquely powerful in India compared to email?",o:["WhatsApp is free; email costs money","WhatsApp open rates are 70–80% vs email's 20–25%; Indian customers actively read WhatsApp messages","WhatsApp has better design capabilities than email","WhatsApp integrates directly with Meta Ads"],a:1},
    {q:"What is the COD-to-prepaid conversion mechanic on WhatsApp?",o:["Sending a discount when COD customers try to cancel","A WhatsApp message after a COD order offering an incentive to switch to prepaid, reducing RTO and improving profitability","Converting prepaid customers to COD for better UX","An automated message that confirms COD orders only"],a:1},

// ─── FIREBASE HELPERS ────────────────────────────────────────
function sk(email){ return email.replace(/\./g,'_'); }

async function fbGet(path){
  const snap = await db.ref(path).once('value');
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, value){
  await db.ref(path).set(value);
}

// ─── STATE ───────────────────────────────────────────────────
let CU = null; // current user
let CV = 'dash'; // current view
let CC = null; // current chapter
let TS = null; // test state
let AT = 'users'; // admin tab

// ─── AUTH HELPERS ────────────────────────────────────────────
function showMsg(msg, type){
  const el = document.getElementById('auth-msg');
  el.className = 'auth-msg ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function switchTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('signup-form').style.display = tab==='signup'?'block':'none';
  document.getElementById('auth-msg').style.display = 'none';
}

// ─── INIT ADMIN ──────────────────────────────────────────────
async function initAdmin(){
  const existing = await fbGet('mk_academy/admin');
  if(!existing){
    await fbSet('mk_academy/admin',{name:'Krishan Kumar (KK)',email:'admin@millionskart.com',password:'mkadmin2026'});
  }
}

// ─── LOGIN ───────────────────────────────────────────────────
async function doLogin(){
  const email = document.getElementById('le').value.trim().toLowerCase();
  const pass = document.getElementById('lp').value;
  if(!email||!pass){showMsg('Please fill in all fields.','error');return;}
  showMsg('Signing in...','success');
  try{
    const admin = await fbGet('mk_academy/admin');
    if(admin && admin.email===email && admin.password===pass){
      CU={name:admin.name,email,role:'admin'};
      launchApp();return;
    }
    const user = await fbGet('mk_academy/users/'+sk(email));
    if(!user){showMsg('No account found with this email.','error');return;}
    if(user.password!==pass){showMsg('Incorrect password.','error');return;}
    if(!user.approved){showMsg('Your account is pending admin approval. Please contact your team lead.','error');return;}
    CU={name:user.name,email,role:'learner'};
    launchApp();
  }catch(e){showMsg('Connection error. Please try again.','error');console.error(e);}
}

// ─── SIGNUP ──────────────────────────────────────────────────
async function doSignup(){
  const name = document.getElementById('sn').value.trim();
  const email = document.getElementById('se').value.trim().toLowerCase();
  const pass = document.getElementById('sp').value;
  if(!name||!email||!pass){showMsg('Please fill in all fields.','error');return;}
  if(pass.length<6){showMsg('Password must be at least 6 characters.','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showMsg('Please enter a valid email address.','error');return;}
  showMsg('Creating account...','success');
  try{
    const existing = await fbGet('mk_academy/users/'+sk(email));
    if(existing){showMsg('An account with this email already exists.','error');return;}
    await fbSet('mk_academy/users/'+sk(email),{name,email,password:pass,approved:false,createdAt:Date.now(),progress:{},scores:{},previousWrong:{},attemptCount:{}});
    document.getElementById('sn').value='';
    document.getElementById('se').value='';
    document.getElementById('sp').value='';
    switchTab('login');
    showMsg('Account created! Please wait for admin approval before signing in.','success');
  }catch(e){showMsg('Connection error. Please try again.','error');console.error(e);}
}

// ─── LOGOUT ──────────────────────────────────────────────────
function doLogout(){
  CU=null;
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  switchTab('login');
  document.getElementById('le').value='';
  document.getElementById('lp').value='';
}

// ─── LAUNCH ──────────────────────────────────────────────────
function launchApp(){
  document.getElementById('auth-screen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';app.style.flexDirection='column';
  document.getElementById('un').textContent=CU.name;
  document.getElementById('ur').textContent=CU.role==='admin'?'Admin':'Learner';
  document.getElementById('ua').textContent=CU.name.charAt(0).toUpperCase();
  if(CU.role==='admin'){document.getElementById('nav-admin').style.display='flex';document.getElementById('sb-bottom').style.display='none';}
  else{document.getElementById('nav-admin').style.display='none';document.getElementById('sb-bottom').style.display='block';}
  renderSB();showDash();
}

// ─── USER DATA ───────────────────────────────────────────────
async function getUD(){
  if(CU.role==='admin')return{progress:{},scores:{}};
  return await fbGet('mk_academy/users/'+sk(CU.email))||{progress:{},scores:{}};
}
async function getUP(){const d=await getUD();return d.progress||{};}
async function isPassed(id){if(CU.role==='admin')return true;const p=await getUP();return p[id]==='passed';}
async function isUnlocked(id){if(CU.role==='admin')return true;if(id===1)return true;return await isPassed(id-1);}
async function passedCount(){const p=await getUP();return Object.values(p).filter(v=>v==='passed').length;}

// ─── SIDEBAR ─────────────────────────────────────────────────
async function renderSB(){
  const c=document.getElementById('sb-chapters');
  const pc=await passedCount();
  document.getElementById('prog-txt').textContent=pc+' / 5';
  document.getElementById('prog-fill').style.width=((pc/5)*100)+'%';
  let h='';
  for(const ch of CHS){
    const u=await isUnlocked(ch.id);
    const p=await isPassed(ch.id);
    const act=CC&&CC.id===ch.id;
    let ic=u?(p?'d':'u'):'l';if(act&&u)ic='a';
    const st=!u?'Locked':p?'✓ Passed':'Not started';
    const sc=!u?'locked':p?'passed':'';
    const ri=!u?'<span style="font-size:12px;color:var(--locked)">🔒</span>':p?'<span style="font-size:13px;color:var(--success)">✓</span>':'';
    h+=`<div class="ch-item ${!u?'locked-item':''} ${act?'active':''}" onclick="${u?`selCh(${ch.id})`:''}">
      <div class="ch-icon ${ic}">${ch.e}</div>
      <div class="ch-meta"><div class="ch-name">${ch.t}</div><div class="ch-status ${sc}">${st}</div></div>
      ${ri}</div>`;
  }
  c.innerHTML=h;
}

// ─── NAV ─────────────────────────────────────────────────────
function setTS(n){document.getElementById('ts').textContent=n;}
function setNA(id){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById(id);if(el)el.classList.add('active');
}
async function selCh(id){
  const ch=CHS.find(c=>c.id===id);
  if(!ch||!(await isUnlocked(id)))return;
  CC=ch;CV='chapter';renderSB();setNA('');renderChView(ch);
}

// ─── TEST ENGINE ─────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

async function startTest(chId){
  const ch=CHS.find(c=>c.id===chId);
  CC=ch;CV='test';
  const ud=await getUD();
  const prevWrong=ud.previousWrong&&ud.previousWrong[chId]?ud.previousWrong[chId]:[];
  const attempts=ud.attemptCount&&ud.attemptCount[chId]?ud.attemptCount[chId]:0;
  const total=Math.min(15,ch.qs.length);
  let questions;
  if(attempts===0||prevWrong.length===0){
    questions=shuffle([...ch.qs]).slice(0,total);
  }else{
    const wrongQs=ch.qs.filter((_,i)=>prevWrong.includes(i));
    const rightQs=ch.qs.filter((_,i)=>!prevWrong.includes(i));
    const hw=shuffle(wrongQs).slice(0,Math.ceil(total/2));
    const hn=shuffle(rightQs).slice(0,Math.floor(total/2));
    questions=shuffle([...hw,...hn]).slice(0,total);
  }
  TS={chId,questions,cur:0,answers:new Array(questions.length).fill(null)};
  renderQ();renderSB();
}

function renderQ(){
  const{questions,cur,answers}=TS;
  const q=questions[cur];
  const ch=CHS.find(c=>c.id===TS.chId);
  const total=questions.length;
  setTS('Test — '+ch.t);
  const ci=document.getElementById('ci');
  const L=['A','B','C','D'];
  const allAns=answers.every(a=>a!==null);
  const ansCount=answers.filter(a=>a!==null).length;
  ci.innerHTML=`
    <div style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:500">📝 ${ch.e} ${ch.t} — Test</div>
        <div style="font-size:13px;color:var(--text-secondary)">${ansCount}/${total} answered</div>
      </div>
      <div class="t-prog"><div class="t-prog-fill" style="width:${((cur+1)/total)*100}%"></div></div>
    </div>
    <div class="q-num">Question ${cur+1} of ${total}</div>
    <div class="q-text">${q.q}</div>
    <div class="opts">
      ${q.o.map((opt,i)=>`<div class="opt ${answers[cur]===i?'sel':''}" onclick="selAns(${i})">
        <div class="opt-ltr">${L[i]}</div><div>${opt}</div>
      </div>`).join('')}
    </div>
    <div class="test-nav">
      <button class="btn btn-secondary btn-sm" onclick="tNav(-1)" ${cur===0?'disabled':''}>← Back</button>
      <div style="display:flex;gap:8px;align-items:center">
        ${cur<total-1
          ?`<button class="btn btn-primary btn-sm" onclick="tNav(1)" ${answers[cur]===null?'disabled':''}>Next →</button>`
          :`<button class="btn btn-success btn-sm" onclick="submitTest()" ${!allAns?'disabled':''}>Submit ${allAns?'✓':ansCount+'/'+total}</button>`
        }
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:4px;flex-wrap:wrap">
      ${answers.map((a,i)=>`<div style="width:28px;height:28px;border-radius:4px;border:1.5px solid ${i===cur?'var(--accent)':a!==null?'var(--success)':'var(--border)'};background:${i===cur?'var(--accent-light)':a!==null?'var(--success-light)':'var(--bg)'};display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;font-weight:600;color:${i===cur?'var(--accent)':a!==null?'var(--success)':'var(--text-tertiary)'}" onclick="TS.cur=${i};renderQ()">${i+1}</div>`).join('')}
    </div>`;
}

function selAns(idx){TS.answers[TS.cur]=idx;renderQ();}
function tNav(d){TS.cur=Math.max(0,Math.min(TS.questions.length-1,TS.cur+d));renderQ();}

async function submitTest(){
  const{questions,answers,chId}=TS;
  const ch=CHS.find(c=>c.id===chId);
  let correct=0;const wrongIdx=[];
  questions.forEach((q,i)=>{
    const oi=ch.qs.findIndex(oq=>oq.q===q.q);
    if(answers[i]===q.a)correct++;
    else if(oi!==-1)wrongIdx.push(oi);
  });
  const total=questions.length;
  const score=Math.round((correct/total)*100);
  const passed=score>=70;

  if(CU.role!=='admin'){
    const ud=await getUD();
    if(!ud.progress)ud.progress={};
    if(!ud.scores)ud.scores={};
    if(!ud.previousWrong)ud.previousWrong={};
    if(!ud.attemptCount)ud.attemptCount={};
    if(passed)ud.progress[chId]='passed';
    ud.scores[chId]=Math.max(ud.scores[chId]||0,score);
    ud.previousWrong[chId]=wrongIdx;
    ud.attemptCount[chId]=(ud.attemptCount[chId]||0)+1;
    await fbSet('mk_academy/users/'+sk(CU.email),ud);
  }
  renderResult(score,correct,total,passed,chId);
  renderSB();
}

function renderResult(score,correct,total,passed,chId){
  const ch=CHS.find(c=>c.id===chId);
  const next=CHS.find(c=>c.id===chId+1);
  setTS('Test Result — '+ch.t);
  document.getElementById('ci').innerHTML=`
    <div class="card res-card">
      <div style="font-size:48px">${passed?'🎉':'💪'}</div>
      <div class="res-score ${passed?'pass':'fail'}">${score}%</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">${passed?'Chapter passed!':'Not quite — try again.'}</div>
      <div style="font-size:14px;color:var(--text-secondary);margin-bottom:24px">${passed
        ?`You scored ${score}% — above the 70% pass mark. ${next?'Chapter '+next.id+' — '+next.t+' is now unlocked!':'You\'ve completed the entire MK Marketing Academy! 🏆'}`
        :`You scored ${score}% — need 70% to pass. Review the chapter and retry. Your next attempt will include questions you got wrong mixed with new ones.`}</div>
      <div class="res-stats">
        <div class="res-stat"><div class="res-stat-val" style="color:var(--success)">${correct}</div><div class="res-stat-lab">Correct</div></div>
        <div class="res-stat"><div class="res-stat-val" style="color:var(--error)">${total-correct}</div><div class="res-stat-lab">Incorrect</div></div>
        <div class="res-stat"><div class="res-stat-val">${total}</div><div class="res-stat-lab">Total</div></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="selCh(${chId})">← Back to chapter</button>
        ${!passed?`<button class="btn btn-primary btn-sm" onclick="startTest(${chId})">Retry test →</button>`:''}
        ${passed&&next?`<button class="btn btn-success btn-sm" onclick="selCh(${next.id})">Next: ${next.t} →</button>`:''}
        ${passed&&!next?`<button class="btn btn-success btn-sm" onclick="showDash()">View dashboard 🏆</button>`:''}
      </div>
    </div>`;
}

          </div>
        </div>

        const prog=u.progress||{};const scores=u.scores||{};

async function addMember(){
  const name=document.getElementById('in').value.trim();
  const email=document.getElementById('ie').value.trim().toLowerCase();
  const pass=document.getElementById('ip').value;
  const access=document.getElementById('ia').value;
  const msg=document.getElementById('imsg');
  if(!name||!email||!pass){msg.innerHTML='<div class="imsg e">Please fill all fields.</div>';return;}
  if(pass.length<6){msg.innerHTML='<div class="imsg e">Password must be at least 6 characters.</div>';return;}
  const existing=await fbGet('mk_academy/users/'+sk(email));
  if(existing){msg.innerHTML='<div class="imsg e">An account with this email already exists.</div>';return;}
  let progress={};
  if(access==='all')CHS.forEach(ch=>{progress[ch.id]='passed';});
  await fbSet('mk_academy/users/'+sk(email),{name,email,password:pass,approved:true,createdAt:Date.now(),progress,scores:{},previousWrong:{},attemptCount:{}});
  msg.innerHTML=`<div class="imsg s">✓ Account created for ${name}. Login: ${email} / ${pass}</div>`;
  document.getElementById('in').value='';
  document.getElementById('ie').value='';
}

async function approveUser(safeKey){
  const u=await fbGet('mk_academy/users/'+safeKey);
  if(u){u.approved=true;await fbSet('mk_academy/users/'+safeKey,u);}
  renderAdmin();
}
async function resetUser(safeKey){
  if(!confirm('Reset all progress for this user?'))return;
  const u=await fbGet('mk_academy/users/'+safeKey);
  if(u){u.progress={};u.scores={};u.previousWrong={};u.attemptCount={};await fbSet('mk_academy/users/'+safeKey,u);}
  renderAdmin();
}
async function removeUser(safeKey){
  if(!confirm('Remove this user from the academy?'))return;
  const u=await fbGet('mk_academy/users/'+safeKey);
  if(u){u.removed=true;u.approved=false;await fbSet('mk_academy/users/'+safeKey,u);}
  renderAdmin();
}
